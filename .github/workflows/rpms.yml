name: Download RHEL 10 CIFS RPMs

on:
  workflow_dispatch:

jobs:
  download-rpms:
    runs-on: ubuntu-latest
    steps:
      - name: Download RPMs using RHEL 10 Container
        run: |
          # RHEL 10 기반 컨테이너 실행 및 패키지 다운로드
          docker run --rm -v ${{ github.workspace }}:/downloads ://registry.access.redhat.com bash -c "
            dnf install -y 'dnf-command(download)' && \
            mkdir /downloads/cifs_rpms && \
            dnf download --resolve --alldeps --destdir=/downloads/cifs_rpms cifs-utils
          "
      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: rhel10-cifs-rpms
          path: cifs_rpms/
          retention-days: 1
