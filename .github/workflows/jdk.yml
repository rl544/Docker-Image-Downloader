name: Docker Image Downloader (Eclipse Temurin)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Images
        run: |
          # Eclipse Temurin 공식 이미지 풀 (JDK와 JRE)
          docker pull eclipse-temurin:8-jdk
          docker pull eclipse-temurin:8-jre
          
      - name: Save Images to TAR
        run: |
          # 두 이미지를 하나의 tar 파일로 묶어서 저장
          docker save eclipse-temurin:8-jdk eclipse-temurin:8-jre -o temurin_images8.tar
          docker save eclipse-temurin:8-jre -o temurin_images8_jre.tar
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: temurin-images
          path: temurin_images8.tar
          retention-days: 1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: temurin-jre-image
          path: temurin_images8_jre.tar
          retention-days: 1
